; Minimum PHP limits for Certalytic file uploads (audio transcription up to 100 MB).
; Merge into your local php.ini or pass to artisan serve:
;   php -c php/uploads.ini artisan serve
upload_max_filesize = 128M
post_max_size = 128M
max_file_uploads = 20
max_execution_time = 300
max_input_time = 300
